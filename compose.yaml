x-rtlbs-server-base: &rtlbs_server_base
  build:
    context: .
    dockerfile: Dockerfile.rtlbs-server.dev
  working_dir: /app/server
  volumes:
    - ./rtlbs-server:/app/server

services:

  fixtures:
    <<: *rtlbs_server_base
    init: true
    command:
      - sh
      - -c
      - |
        set -e
        cat > core/settings_local.py <<'EOF'
        API_URL = 'http://localhost:18100/'
        EOF
        echo '[fixtures] Running migrations'
        python manage.py migrate
        #echo '[fixtures] Fetching runs from speedrun.com'
        #python manage.py fetch_runs --debug
        echo '[fixtures] Generating client fixtures'
        python manage.py dump_client_fixtures > /app/client/src/fixtures.js
    volumes:
      - ./rtlbs-server:/app/server
      - ./rtlbs-client:/app/client

  server:
    <<: *rtlbs_server_base
    init: true
    command:
      - sh
      - -c
      - |
        set -e
        cat > core/settings_local.py <<'EOF'
        API_URL = 'http://localhost:18100/'
        EOF
        exec python manage.py runserver 0.0.0.0:8000
    ports:
      - "18100:8000"
    depends_on:
      fixtures:
        condition: service_completed_successfully

  client:
    build:
      context: .
      dockerfile: Dockerfile.rtlbs-client.dev
    init: true
    working_dir: /app
    command:
      - sh
      - -c
      - |
        cat > vue.config.js <<'EOF'
        const path = require('path')

        module.exports = {
          chainWebpack: config => {
            config.module
              .rule('eslint')
              .exclude
              .add(path.resolve(__dirname, 'src/fixtures.js'))
          }
        }
        EOF
        cat > src/config.js <<'EOF'
        export default {
          API_URL: 'http://localhost:18100/'
        }
        EOF
        until [ -f src/fixtures.js ]; do sleep 1; done
        exec npm run serve -- --host 0.0.0.0 --port 8080
    volumes:
      - ./rtlbs-client:/app
      - /app/node_modules
    ports:
      - "8080:8080"
    depends_on:
      fixtures:
        condition: service_completed_successfully
      server:
        condition: service_started
